name: Docker Image CI & publis to K8S

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

  workflow_dispatch:

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    - name: genarate image tag
      run: |
        echo "IMAGE_TAG=$(date +%s)" >> $GITHUB_ENV


    - uses: actions/checkout@v4
    - name: Build the Docker image
      run: |
        docker build . --file Dockerfile --tag ghcr.io/mzalan/ghaction-k8s-13a-acsop:$IMAGE_TAG
        docker login ghcr.io -u mzalan -p ${{ secrets.GHCR_TOKEN }}
        docker push ghcr.io/mzalan/ghaction-k8s-13a-acsop:$IMAGE_TAG

        sed -i 's|image: ghcr.io/mzalan/ghaction-k8s-13a-acsop:.*|image: ghcr.io/mzalan/ghaction-k8s-13a-acsop:'"$IMAGE_TAG"'|' deployment.yaml

